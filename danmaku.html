<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>陈好专属点餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *{font-family:"微软雅黑",sans-serif;}
        .card-round{border-radius:18px;overflow:hidden;box-shadow:0 3px 12px #00000015;}
        .menu-item{transition:0.25s all;cursor:pointer;padding:8px 6px;border-radius:8px;margin:3px 0;}
        .menu-item:hover{background:#fef0e6;transform:translateX(3px);}
        .active-menu{background:#ffe8d6;color:#ff6b6b;font-weight:bold;}
    </style>
</head>
<body class="bg-[#f9f7f2] max-w-[420px] mx-auto my-3 rounded-2xl overflow-hidden bg-white border border-gray-200">
    <!--顶部封面-->
    <div>
        <img src="https://github.com/SSs01AS/chenchenhaos/raw/main/OIP-C%20(1).jpg" class="w-full h-[220px] object-cover">
        <div class="py-3 text-center text-black font-bold text-xl tracking-wider">
            =☐ω☐= 陈好专属 =☐ω☐=
        </div>
    </div>

    <div class="flex">
        <!--左侧菜单-->
        <div class="w-[35%] bg-[#fff7ef] py-3 px-2 flex flex-col">
            <div class="font-bold text-lg pl-2 mb-3 border-l-4 border-orange-400">菜单列表</div>
            <div class="menu-item" onclick="switchTab('notice')">📌 下单须知</div>
            <div class="menu-item" onclick="switchTab('milk')">🥤 点奶茶</div>
            <div class="menu-item" onclick="switchTab('eat')">🍚 吃饭</div>
            <div class="menu-item" onclick="switchTab('snack')">🍪 吃零食</div>
            <div class="menu-item text-red-500 mt-3" onclick="switchTab('waste')">❌ 拒绝浪费</div>
            <div class="menu-item text-rose-400" onclick="switchTab('suggest')">❤️ 投诉&介意</div>
        </div>
        <!--右侧内容区-->
        <div class="w-[65%] p-3 min-h-[380px] flex flex-col items-center justify-center">
            <div id="notice" class="content-box text-center">
                <div class="text-lg font-bold mb-3">📢下单须知</div>
                <p class="text-gray-600 text-sm">按需点餐，理性消费<br>爱惜粮食，拒绝铺张浪费</p>
            </div>

            <div id="milk" class="content-box hidden text-center">
                <img src="https://github.com/SSs01AS/chenchenhaos/raw/main/166c08a5ae17ce.jpg" class="w-[180px] rounded-xl">
                <div class="mt-3">奶茶套餐</div>
            </div>

            <div id="eat" class="content-box hidden text-center">
                <img src="https://github.com/SSs01AS/chenchenhaos/raw/main/v2-c6add65a83a32d6e43fc49aa996b9206_r.jpg" class="w-[180px] rounded-xl">
                <div class="mt-3">干饭正餐</div>
            </div>

            <div id="snack" class="content-box hidden text-center">
                <img src="https://github.com/SSs01AS/chenchenhaos/raw/main/OIP-C%20(2).jpg" class="w-[180px] rounded-xl">
                <div class="mt-3">休闲零食</div>
            </div>

            <div id="waste" class="content-box hidden text-center">
                <div class="text-red-500 font-bold text-lg">拒绝浪费</div>
                <p class="text-sm text-gray-500 mt-2">吃多少点多少，杜绝浪费粮食</p>
            </div>

            <div id="suggest" class="content-box hidden text-center">
                <div class="text-rose-400 font-bold text-lg">投诉/介意反馈</div>
                <p class="text-sm text-gray-500 mt-2">有不满意随时反馈调整</p>
            </div>
        </div>
    </div>

<script>
function switchTab(id){
    document.querySelectorAll('.content-box').forEach(item=>item.classList.add('hidden'))
    document.getElementById(id).classList.remove('hidden')
    document.querySelectorAll('.menu-item').forEach(item=>item.classList.remove('active-menu'))
    event.target.classList.add('active-menu')
}
</script>
</body>
</html>
